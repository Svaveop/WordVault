<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📘 Word Vault</title>

    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📘</text></svg>">

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>📘 Word Vault</h1>
    <div class="counter" id="wordCounter">Total words: 0</div>

    <div class="input-group">
        <input type="text" id="wordInput" placeholder="Enter word...">
        <input type="text" id="translationInput" placeholder="Enter translation...">
        <button onclick="addWord()">Add</button>
    </div>

    <div class="search-section">
        <div class="search-bar">
            <i class="fas fa-search"></i>
            <input type="text" id="searchInput" placeholder="Search..." oninput="searchWords()">
        </div>
        <button class="translate-btn" id="toggleTranslate" onclick="toggleTranslations()">
            <i class="fas fa-language"></i>
        </button>
        <button onclick="exportJSON()">Export JSON</button>
    </div>

    <ul id="wordList"></ul>
    <div id="emptyMessage" class="empty">No words added yet.</div>
    <div class="uniqueness">
        This app is unique: no ads, no subscriptions, no distractions — just your words.
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
